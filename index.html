<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sugar Shot Work Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel-2:#1e222c; --line:#2a2f3a;
    --text:#e8eaf0; --muted:#9aa3b2; --muted-2:#6b7384;
    /* Supervisor = light red shade */
    --sup:#e0566a; --sup-soft:#3a1f25; --sup-tint:#f8d7da; --sup-deep:#c0392b;
    /* Expert = golden shade */
    --exp:#e8b13a; --exp-soft:#3a2f12; --exp-tint:#f6e6b8; --exp-deep:#b8860b;
    --ok:#3fbf7f; --warn:#e8b13a; --bad:#e0566a; --info:#5b9bd5;
    --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #1b2030 0%, var(--bg) 55%);
    color:var(--text); font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a{color:inherit}
  button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font:inherit;color:var(--text)}
  .hidden{display:none !important}

  /* ---------- Brand / header ---------- */
  .brandbar{display:flex;align-items:center;gap:14px;padding:16px 26px;border-bottom:1px solid var(--line);
    background:linear-gradient(90deg, rgba(224,86,106,.10), rgba(232,177,58,.10));}
  .logo{width:40px;height:40px;border-radius:11px;display:grid;place-items:center;font-weight:800;font-size:20px;
    background:conic-gradient(from 200deg,var(--sup),var(--exp));color:#1b1b1b;box-shadow:var(--shadow)}
  .brand h1{font-size:18px;margin:0;letter-spacing:.3px}
  .brand p{margin:0;color:var(--muted);font-size:12px}
  .spacer{flex:1}
  .pill{font-size:12px;color:var(--muted);border:1px solid var(--line);padding:6px 11px;border-radius:999px;background:var(--panel)}

  /* ---------- Landing ---------- */
  .wrap{max-width:1280px;margin:0 auto;padding:26px}
  .landing{min-height:70vh;display:grid;place-items:center}
  .landing-inner{width:100%;max-width:820px;text-align:center}
  .landing h2{font-size:30px;margin:6px 0 6px}
  .landing .sub{color:var(--muted);margin-bottom:34px}
  .channels{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .channel{border-radius:var(--radius);padding:34px 26px;border:1px solid var(--line);text-align:left;
    transition:transform .15s ease, box-shadow .15s ease;position:relative;overflow:hidden}
  .channel:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .channel .tag{font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
  .channel h3{font-size:24px;margin:10px 0 8px}
  .channel p{color:var(--muted);margin:0 0 22px;min-height:42px}
  .channel .go{display:inline-flex;align-items:center;gap:8px;font-weight:700;padding:11px 18px;border-radius:10px}
  .ch-sup{background:linear-gradient(160deg, rgba(224,86,106,.16), rgba(224,86,106,.04));border-color:rgba(224,86,106,.5)}
  .ch-sup .tag{color:var(--sup)} .ch-sup .go{background:var(--sup);color:#221015}
  .ch-exp{background:linear-gradient(160deg, rgba(232,177,58,.16), rgba(232,177,58,.04));border-color:rgba(232,177,58,.5)}
  .ch-exp .tag{color:var(--exp)} .ch-exp .go{background:var(--exp);color:#241c08}
  .channel .glow{position:absolute;width:240px;height:240px;border-radius:50%;filter:blur(60px);opacity:.25;right:-60px;top:-60px}
  .ch-sup .glow{background:var(--sup)} .ch-exp .glow{background:var(--exp)}

  /* ---------- Login ---------- */
  .auth{max-width:430px;margin:6vh auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:30px;box-shadow:var(--shadow)}
  .auth.sup{border-top:4px solid var(--sup)}
  .auth.exp{border-top:4px solid var(--exp)}
  .auth h3{margin:2px 0 4px;font-size:22px}
  .auth .lead{color:var(--muted);font-size:13px;margin-bottom:20px}
  label{display:block;font-size:12px;color:var(--muted);margin:14px 0 6px;font-weight:600;letter-spacing:.3px}
  .field{width:100%;background:var(--panel-2);border:1px solid var(--line);border-radius:10px;padding:11px 12px;outline:none}
  .field:focus{border-color:var(--info)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 16px;border-radius:10px;font-weight:700;border:1px solid var(--line);background:var(--panel-2)}
  .btn:hover{filter:brightness(1.08)}
  .btn-sup{background:var(--sup);color:#221015;border-color:transparent}
  .btn-exp{background:var(--exp);color:#241c08;border-color:transparent}
  .btn-ghost{background:transparent}
  .btn-block{width:100%;margin-top:18px}
  .btn-sm{padding:7px 11px;font-size:13px;border-radius:8px}
  .err{color:var(--bad);font-size:13px;margin-top:12px;min-height:18px}
  .hint{margin-top:18px;padding:12px;border:1px dashed var(--line);border-radius:10px;background:var(--panel-2);font-size:12px;color:var(--muted)}
  .hint b{color:var(--text)}
  .backlink{display:inline-block;margin-bottom:14px;color:var(--muted);font-size:13px}

  /* ---------- App shell ---------- */
  .shell{display:grid;grid-template-columns:248px 1fr;min-height:calc(100vh - 73px)}
  .side{border-right:1px solid var(--line);padding:18px 14px;background:var(--panel)}
  .side .who{padding:12px;border-radius:12px;background:var(--panel-2);border:1px solid var(--line);margin-bottom:16px}
  .side .who .role{font-size:11px;letter-spacing:1px;text-transform:uppercase;font-weight:700}
  .side.sup .who .role{color:var(--sup)} .side.exp .who .role{color:var(--exp)}
  .side .who .name{font-weight:700;font-size:16px;margin-top:2px}
  .side .who .meta{color:var(--muted);font-size:12px;margin-top:3px}
  .navitem{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:10px;color:var(--muted);font-weight:600;margin-bottom:3px;width:100%;text-align:left}
  .navitem .ic{width:22px;text-align:center}
  .navitem:hover{background:var(--panel-2);color:var(--text)}
  .navitem.active{color:var(--text)}
  .side.sup .navitem.active{background:rgba(224,86,106,.16);color:#ffd2d9}
  .side.exp .navitem.active{background:rgba(232,177,58,.16);color:#ffe9b0}
  .navcount{margin-left:auto;font-size:11px;background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:1px 8px;color:var(--muted)}

  .main{padding:24px 28px;overflow:auto}
  .page-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .page-head h2{margin:0;font-size:22px}
  .page-head .desc{color:var(--muted);font-size:13px}

  /* ---------- Banner / notifications ---------- */
  .banner{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;margin-bottom:16px;border:1px solid}
  .banner.warn{background:rgba(232,177,58,.10);border-color:rgba(232,177,58,.4);color:#ffe9b0}
  .banner.bad{background:rgba(224,86,106,.10);border-color:rgba(224,86,106,.4);color:#ffd2d9}
  .banner .btn{margin-left:auto}
  .bell{position:relative}
  .bell .dot{position:absolute;top:-3px;right:-3px;width:9px;height:9px;border-radius:50%;background:var(--bad);border:2px solid var(--panel)}

  /* ---------- Cards / grid ---------- */
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .card .k{color:var(--muted);font-size:12px;letter-spacing:.4px;text-transform:uppercase}
  .card .v{font-size:26px;font-weight:800;margin-top:6px}
  .card .v.sm{font-size:18px}

  /* ---------- Tables ---------- */
  .tablewrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:auto}
  table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:920px}
  th,td{padding:11px 12px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:600;font-size:11.5px;letter-spacing:.5px;text-transform:uppercase;position:sticky;top:0;background:var(--panel);z-index:1}
  tbody tr:hover{background:var(--panel-2)}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .expert-cell{color:var(--exp);font-weight:700;cursor:pointer;text-decoration:underline dotted}
  .supervisor-cell{color:var(--sup);font-weight:700}

  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:999px;letter-spacing:.3px}
  .b-active{background:rgba(91,155,213,.18);color:#a9cdf0}
  .b-completed{background:rgba(63,191,127,.16);color:#9be8c0}
  .b-lost{background:rgba(224,86,106,.16);color:#ffb3bd}
  .b-await{background:rgba(232,177,58,.16);color:#ffe1a0}
  .b-assigned{background:rgba(63,191,127,.16);color:#9be8c0}
  .b-unassigned{background:rgba(150,150,150,.18);color:#c8cdd6}
  .b-locked{background:rgba(91,155,213,.18);color:#a9cdf0}

  .empty{padding:46px;text-align:center;color:var(--muted)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
  .search{flex:1;min-width:200px}

  /* ---------- Expert list ---------- */
  .exgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .excard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;cursor:pointer;transition:.15s}
  .excard:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:rgba(232,177,58,.5)}
  .ava{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;font-weight:800;color:#241c08;background:var(--exp)}
  .excard .top{display:flex;align-items:center;gap:12px}
  .excard h4{margin:0;font-size:16px}
  .excard .role{color:var(--muted);font-size:12px}
  .ratepill{margin-top:14px;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--muted)}
  .ratebar{height:7px;border-radius:99px;background:var(--panel-2);overflow:hidden;margin-top:5px}
  .ratebar > i{display:block;height:100%;border-radius:99px}

  /* ---------- Expert dashboard ---------- */
  .hello{font-size:24px;margin:0}
  .dash{display:grid;grid-template-columns:1.7fr 1fr;gap:18px;align-items:start}
  .panel-head{display:flex;align-items:center;gap:10px;margin:0 0 12px}
  .panel-head h3{margin:0;font-size:16px}
  .panel-head .desc{color:var(--muted);font-size:12px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;display:flex;flex-direction:column;gap:9px}
  .pcard:hover{border-color:rgba(232,177,58,.5)}
  .pcard .ptop{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .pcard h4{margin:0;font-size:16px}
  .psub{color:var(--muted);font-size:12.5px}
  .pupdate{font-size:13px;background:var(--panel-2);border-radius:8px;padding:9px 11px;border-left:3px solid var(--exp)}
  .pupdate .t{color:var(--muted);font-size:11px;margin-top:4px}
  .pfoot{display:flex;gap:8px;margin-top:4px}
  .feedcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .card .v small{font-size:13px;color:var(--muted);font-weight:600}
  @media (max-width:980px){ .dash{grid-template-columns:1fr} }

  /* ---------- Modal ---------- */
  .overlay{position:fixed;inset:0;background:rgba(5,7,12,.66);backdrop-filter:blur(3px);display:grid;place-items:center;padding:24px;z-index:50}
  .modal{width:100%;max-width:680px;max-height:88vh;overflow:auto;background:var(--panel);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
  .modal.lg{max-width:860px}
  .modal-head{display:flex;align-items:center;gap:12px;padding:18px 22px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel);z-index:2}
  .modal-head h3{margin:0;font-size:18px}
  .modal-body{padding:20px 22px}
  .modal-foot{padding:16px 22px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:var(--panel)}
  .x{margin-left:auto;font-size:22px;color:var(--muted);line-height:1}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px 16px}
  .ro{background:var(--panel-2);border:1px dashed var(--line);border-radius:10px;padding:10px 12px}
  .ro .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .ro .v{font-weight:600;margin-top:2px}
  .section-title{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:18px 0 8px;font-weight:700}
  .note{font-size:12px;color:var(--muted-2);margin-top:6px}

  /* review sliders */
  .rev-row{display:grid;grid-template-columns:1fr 60px;gap:12px;align-items:center;margin:12px 0}
  .rev-row input[type=range]{width:100%}
  .rev-val{text-align:center;font-weight:800;font-size:18px;background:var(--panel-2);border:1px solid var(--line);border-radius:8px;padding:4px}
  .rev-total{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding:14px;border-radius:12px;background:var(--panel-2);border:1px solid var(--line)}
  .rev-total .big{font-size:26px;font-weight:800}

  /* report */
  .report-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .rep{background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .rep .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .rep .v{font-size:21px;font-weight:800;margin-top:4px}
  .rep .v small{font-size:13px;color:var(--muted);font-weight:600}
  .rep.good .v{color:#9be8c0} .rep.bad .v{color:#ffb3bd}
  .rep.hero{grid-column:1/-1;background:linear-gradient(120deg,rgba(232,177,58,.12),rgba(224,86,106,.10))}

  .updates{margin-top:6px}
  .update{padding:10px 12px;border-left:3px solid var(--exp);background:var(--panel-2);border-radius:0 8px 8px 0;margin-bottom:8px}
  .update .t{font-size:11px;color:var(--muted)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--line);
    padding:12px 18px;border-radius:12px;box-shadow:var(--shadow);z-index:80;font-weight:600;display:flex;gap:10px;align-items:center}
  .toast.ok{border-color:rgba(63,191,127,.5)}
  .foot{padding:14px 26px;color:var(--muted-2);font-size:12px;border-top:1px solid var(--line);display:flex;gap:16px;flex-wrap:wrap}
  .foot a{cursor:pointer;text-decoration:underline}
  .req::after{content:" *";color:var(--bad)}
  @media (max-width:880px){
    .shell{grid-template-columns:1fr}
    .channels,.grid2,.grid3,.report-grid{grid-template-columns:1fr}
    .side{border-right:none;border-bottom:1px solid var(--line);display:flex;gap:6px;overflow-x:auto;padding:10px;align-items:center}
    .side .who{display:none}
    .navitem{width:auto;white-space:nowrap;margin-bottom:0;flex:0 0 auto}
    .navitem .navcount{margin-left:6px}
    .main{padding:18px}
  }

  /* ===================== PREMIUM THEME OVERRIDES ===================== */
  :root{
    --bg:#090b10;
    --panel:#13161d; --panel-2:#191d26; --panel-3:#212632;
    --line:rgba(255,255,255,.085); --line-2:rgba(255,255,255,.05);
    --text:#eef0f6; --muted:#99a2b5; --muted-2:#6b7486;
    --sup:#ff5d73; --sup-deep:#e0566a;
    --exp:#f1c14b; --exp-deep:#e3a92f;
    --ok:#46cd8b; --warn:#f1c14b; --bad:#ff5d73; --info:#6aa6e6;
    --radius:16px; --radius-lg:20px;
    --shadow:0 18px 50px -18px rgba(0,0,0,.7);
    --shadow-sm:0 8px 24px -10px rgba(0,0,0,.55);
    --ring:0 0 0 3px rgba(106,166,230,.28);
    --grad-sup:linear-gradient(135deg,#ff6f83,#e0566a);
    --grad-exp:linear-gradient(135deg,#f6d268,#e3a92f);
    --grad-brand:linear-gradient(120deg,#ff5d73,#f1c14b);
    --hairline:inset 0 1px 0 rgba(255,255,255,.06);
  }
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(900px 520px at 88% -8%, rgba(255,93,115,.13), transparent 60%),
      radial-gradient(820px 520px at 0% 0%, rgba(241,193,75,.09), transparent 55%),
      radial-gradient(1000px 720px at 50% 120%, rgba(106,166,230,.07), transparent 60%),
      #090b10;
    background-attachment:fixed;
  }
  ::selection{background:rgba(255,93,115,.3)}
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:99px;border:2px solid transparent;background-clip:padding-box}
  *::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.22);background-clip:padding-box}
  *::-webkit-scrollbar-track{background:transparent}

  .brand h1,.hello,.landing h2,.channel h3,.page-head h2{font-family:'Space Grotesk','Inter',sans-serif;letter-spacing:-.02em}

  .brandbar{position:sticky;top:0;z-index:30;padding:15px 26px;border-bottom:1px solid var(--line);
    background:rgba(11,13,18,.72);backdrop-filter:blur(16px) saturate(140%);-webkit-backdrop-filter:blur(16px) saturate(140%)}
  .logo{border-radius:13px;box-shadow:0 0 0 1px rgba(255,255,255,.08),0 10px 26px -8px rgba(255,93,115,.55)}
  .pill{background:rgba(255,255,255,.04);border-color:var(--line);backdrop-filter:blur(6px)}

  .btn{border-radius:12px;border:1px solid var(--line);background:rgba(255,255,255,.05);
    transition:transform .12s ease, box-shadow .2s ease, filter .2s ease, background .2s ease;box-shadow:var(--hairline)}
  .btn:hover{background:rgba(255,255,255,.09);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-ghost{background:transparent;box-shadow:none}
  .btn-ghost:hover{background:rgba(255,255,255,.06)}
  .btn-sup{background:var(--grad-sup);color:#2c0d12;border-color:transparent;box-shadow:0 10px 24px -10px rgba(255,93,115,.65),var(--hairline)}
  .btn-sup:hover{box-shadow:0 14px 30px -10px rgba(255,93,115,.8),var(--hairline);filter:brightness(1.04)}
  .btn-exp{background:var(--grad-exp);color:#2a1f06;border-color:transparent;box-shadow:0 10px 24px -10px rgba(241,193,75,.6),var(--hairline)}
  .btn-exp:hover{box-shadow:0 14px 30px -10px rgba(241,193,75,.75),var(--hairline);filter:brightness(1.04)}

  .field{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:12px 14px;transition:border .15s, box-shadow .15s, background .15s}
  .field:focus{border-color:var(--info);box-shadow:var(--ring);background:rgba(255,255,255,.06)}
  select.field option{background:#13161d;color:var(--text)}

  .card,.pcard,.feedcard,.tablewrap,.excard{
    background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.012)), var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow-sm),var(--hairline)}
  .card{padding:18px}
  .card .k{color:var(--muted);font-weight:600;font-size:11.5px;letter-spacing:.6px}
  .card .v{font-size:28px;letter-spacing:-.02em;background:linear-gradient(180deg,#ffffff,#c2c8d8);-webkit-background-clip:text;background-clip:text;color:transparent}
  .card .v small{-webkit-text-fill-color:var(--muted);color:var(--muted)}
  .card:hover,.feedcard:hover{border-color:rgba(255,255,255,.14)}

  .card.kpi{position:relative;overflow:hidden}
  .kpi .ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;font-size:17px;margin-bottom:12px;box-shadow:var(--hairline)}
  .kpi .v{font-size:32px}
  .kpi.k-active .ic{background:rgba(106,166,230,.16);color:#a9cdf0}
  .kpi.k-done .ic{background:rgba(70,205,139,.16);color:#9be8c0}
  .kpi.k-lost .ic{background:rgba(255,93,115,.16);color:#ffb3bd}
  .kpi.k-rate .ic{background:rgba(241,193,75,.16);color:#ffe1a0}
  .kpi::after{content:'';position:absolute;right:-34px;top:-34px;width:130px;height:130px;border-radius:50%;filter:blur(44px);opacity:.13;pointer-events:none}

function checkPasswordPolicy(sup){
  const age = daysSince(sup.passSet);
  const left = 90 - age;
  if(left<=15 && left>0){
    const already = DB.notifications.some(n=>n.to===sup.name && n.message.includes('password') && daysSince(n.at)<1);
    if(!already) notifyAll(sup.name, `Reminder: your supervisor password expires in ${left} day(s). Resetting every 90 days is mandatory.`);
  }
  return left; // <=0 means expired -> must reset
}

}

}

function bucketOf(p){
  if(p.status==='Lost') return 'Lost';
  if(p.status==='Completed' && financialsComplete(p)) return 'Completed';
  return 'Active';
}
function awaitingFinancials(p){ return p.status==='Completed' && !financialsComplete(p); }

const expertByName = name => DB.experts.find(e=>e.name===name);

/* ===== Cost formulation + estimation maths (mirrors the reference Google Sheets) ===== */
function num(v){ const n=Number(v); return isFinite(n)?n:0; }
// Reference sheet 1 — profit waterfall  +  reference sheet 2 — production estimate
function computeFormulation(f){
  f=f||{};
  const afterTDS   = num(f.afterTDSValue);                 // Project Value (After TDS) — "START HERE / CHANGE THIS VALUE ONLY"
  const tds        = afterTDS * num(f.tdsPct)/100;         // TDS (PH fee) — added on top
  const total      = afterTDS + tds;                       // Total Project Value (excl GST) — shared to client
  const margin     = afterTDS * num(f.marginPct)/100;     // Profit Margin (30%)
  const afterMargin= afterTDS - margin;                    // Project Value (After Profit Margin)
  const internal   = (f.internalItems||[]).reduce((a,x)=>a+num(x.amount),0); // Internal Cost
  const afterInternal = afterMargin - internal;            // Project Value (After Internal Cost) = External Budget
  // Production estimate (planned external, shared to client)
  const estTotal   = (f.estimateItems||[]).reduce((a,x)=>a+num(x.qty||1)*num(x.rate),0);
  return {total,tds,afterTDS,margin,afterMargin,internal,afterInternal,externalBudget:afterInternal,
          estTotal,estGrand:estTotal};
}
function computeClosing(c,f){
  const cf = computeFormulation(f||{});
  const spent       = (c.actualItems||[]).reduce((a,x)=>a+num(x.amount),0); // Total Amount Spent
  const budget      = cf.externalBudget;
  const moneySaved  = budget - spent;                       // Money Saved
  const totalProfit = cf.margin + cf.internal + moneySaved; // Total Profit
  const actualProfit= cf.margin + moneySaved;               // Actual Profit
  return {spent,budget,moneySaved,totalProfit,actualProfit,cf};
}
function formulationOfProject(pid){ const p=DB.projects.find(x=>x.id===pid); return p&&p.formulationId?DB.formulations.find(f=>f.id===p.formulationId):null; }
// Per-project cost breakdown (same waterfall as the cost sheet) used in the project Financials modal
function computeCost(c){
  const cf = computeFormulation(c);                          // afterTDS, tds, total, margin, afterMargin, internal, externalBudget
  const spent = (c.spentItems||[]).reduce((a,x)=>a+num(x.amount),0);  // Total Amount Spent
  const moneySaved  = cf.externalBudget - spent;             // Money Saved
  const totalProfit = cf.margin + cf.internal + moneySaved;  // Total Profit
  const actualProfit= cf.margin + moneySaved;                // Actual Profit
  return Object.assign({}, cf, {spent, moneySaved, totalProfit, actualProfit});
}

function expProjects(ps,counts){
  const ex = DB.session.user;
  const reviewed = ps.filter(p=>p.review);
  const avg = reviewed.length ? Math.round(reviewed.reduce((a,p)=>a+p.review.total,0)/reviewed.length) : null;
  const hr = new Date().getHours();
  const greet = hr<12?'Good morning':hr<17?'Good afternoon':'Good evening';

  const header = `<div class="page-head"><div>
      <h2 class="hello">${greet}, ${esc(ex.name.split(' ')[0])} 👋</h2>
      <span class="desc">${esc(ex.role)} · here's where your projects stand</span></div>
      <button class="btn btn-exp" id="newProj" style="margin-left:auto">+ New Project</button></div>`;

  const kpis = `<div class="cards">
     <div class="card kpi k-active"><div class="ic">📂</div><div class="k">Active</div><div class="v">${counts.active}</div></div>
     <div class="card kpi k-done"><div class="ic">✓</div><div class="k">Completed</div><div class="v">${counts.completed}</div></div>
     <div class="card kpi k-lost"><div class="ic">✕</div><div class="k">Lost</div><div class="v">${counts.lost}</div></div>
     <div class="card kpi k-rate"><div class="ic">★</div><div class="k">Avg rating</div><div class="v">${avg!=null?`${avg}<small>/40</small>`:'—'}</div></div>
   </div>`;

  // active projects first, then by most recent
  const ord = {Active:0,Completed:1,Lost:2};
  const sorted = ps.slice().sort((a,b)=> (ord[bucketOf(a)]-ord[bucketOf(b)]) || (b.createdAt-a.createdAt));
  const pcards = sorted.map(p=>{
    const last = p.updates.length ? p.updates[p.updates.length-1] : null;
    return `<div class="pcard">
      <div class="ptop"><div><h4>${esc(p.projectName)}</h4>
        <div class="psub">${esc(p.projectType)} · for ${esc(p.supervisorInCharge)}</div></div>
        <span class="badge b-${bucketOf(p).toLowerCase()}">${bucketOf(p)}</span></div>
      <div class="psub">Your role: <b style="color:var(--exp)">${esc(p.expertRole)}</b>${p.review?` · Review <b>${p.review.total}/40</b>`:''}${(p.versions&&p.versions.length)?` · 🔗 ${p.versions.length} edit${p.versions.length>1?'s':''}`:''}</div>
      ${last?`<div class="pupdate">${esc(last.text)}<div class="t">${fdate(last.t)}</div></div>`
            :`<div class="psub">No updates yet — post your first one.</div>`}
      ${awaitingFinancials(p)?'<span class="badge b-await">Marked done · awaiting supervisor financials</span>':''}
      <div class="pfoot"><button class="btn btn-sm btn-exp" data-editmine="${p.id}">Open / Update</button></div>
    </div>`;}).join('');
  const projCol = `<div>
     <div class="panel-head"><h3>My Projects</h3><span class="desc">you fill 1–6 &amp; post updates · supervisor fills the numbers</span></div>
     <div class="exgrid">${pcards||'<div class="empty">No projects yet — add your first one.</div>'}</div></div>`;

  // activity feed across all projects
  let feed = [];
  ps.forEach(p=>p.updates.forEach(u=>feed.push({proj:p.projectName,t:u.t,text:u.text})));
  feed.sort((a,b)=>b.t-a.t); feed = feed.slice(0,8);
  const feedHtml = feed.length
     ? feed.map(f=>`<div class="update"><div><b>${esc(f.proj)}</b></div><div>${esc(f.text)}</div><div class="t">${fdate(f.t)} · ${new Date(f.t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div></div>`).join('')
     : '<div class="note">No recent activity yet.</div>';
  const feedCol = `<div><div class="panel-head"><h3>Recent activity</h3></div>
     <div class="feedcard">${feedHtml}</div></div>`;

  return header + kpis + `<div class="dash">${projCol}${feedCol}</div>`;
}

/* ---- Business report popup (built from the project's Cost Breakdown) ---- */
function modalReport(pid){
  const p = DB.projects.find(x=>x.id===pid);
  const rep=(k,v,cls='')=>`<div class="rep ${cls}"><div class="k">${k}</div><div class="v">${v}</div></div>`;
  if(!p || !p.cost) return `<div class="modal"><div class="modal-head" style="border-top:3px solid var(--exp)"><h3>📊 Business Report</h3><button class="x" data-close>×</button></div>
    <div class="modal-body"><p class="note">No cost breakdown saved for this project yet. Open <b>Cost breakdown</b> on the project and fill it first.</p></div>
    <div class="modal-foot"><button class="btn btn-sup" data-close>Done</button></div></div>`;
  const cc = computeCost(p.cost);
  const actualMarginPct = cc.afterTDS ? (cc.actualProfit/cc.afterTDS*100) : 0;
  const totalMarginPct  = cc.afterTDS ? (cc.totalProfit/cc.afterTDS*100) : 0;
  return `<div class="modal lg"><div class="modal-head" style="border-top:3px solid var(--exp)">
      <h3>📊 Business Report — ${esc(p.projectName)}</h3><button class="x" data-close>×</button></div>
    <div class="modal-body">
      <div class="report-grid">
        ${rep('Actual Profit', `<b style="color:${cc.actualProfit<0?'var(--bad)':'var(--ok)'}">${INR(cc.actualProfit)} <small>(${PCT(actualMarginPct)})</small></b>`,'hero')}
        ${rep('Total Project Value (excl GST)', INR(cc.total))}
        ${rep('TDS', INR(cc.tds))}
        ${rep('Project Value (After TDS)', INR(cc.afterTDS))}
        ${rep('Profit Margin', `${INR(cc.margin)} <small>(${PCT(num(p.cost.marginPct))})</small>`)}
        ${rep('Internal Cost', INR(cc.internal))}
        ${rep('External Budget', INR(cc.externalBudget))}
        ${rep('Total Amount Spent', INR(cc.spent), cc.spent>cc.externalBudget?'bad':'good')}
        ${rep('Money Saved', INR(cc.moneySaved), cc.moneySaved<0?'bad':'good')}
        ${rep('Total Profit', `${INR(cc.totalProfit)} <small>(${PCT(totalMarginPct)})</small>`, cc.totalProfit<0?'bad':'good')}
      </div>
      <p class="note">External budget was ${cc.moneySaved>=0?`under‑spent by ${INR(cc.moneySaved)} ✓`:`over‑spent by ${INR(-cc.moneySaved)} ⚠`}. Total Profit = Margin + Internal Cost + Money Saved; Actual Profit = Margin + Money Saved.</p>
    </div>
    <div class="modal-foot"><button class="btn btn-sup" data-close>Done</button></div></div>`;
}

/* =========================== WIRING =========================== */
function wire(){
  document.querySelectorAll('[data-go]').forEach(el=>el.onclick=()=>{ state={screen:el.dataset.go}; render(); });

  // login buttons
  const liBtn=$('liBtn');
  if(liBtn) liBtn.onclick=()=>{
    const name=$('liName').value, pass=$('liPass').value;
    const res = state.screen==='login-sup' ? loginSupervisor(name,pass) : loginExpert(name,pass);
    if(res.err){ $('liErr').textContent=res.err; return; }
    if(state.screen==='login-sup'){
      DB.session={role:'sup',user:res.ok}; save();
      const left=checkPasswordPolicy(res.ok); save();
      state={screen:'app-sup',tab:'active'}; render();
      if(left<=0) openModal(modalReset());
    } else {
      DB.session={role:'exp',user:res.ok}; save();
      state={screen:'app-exp',tab:'mine'}; render();
    }
  };
  $('liName')&&($('liName').onkeydown=e=>{if(e.key==='Enter')$('liPass').focus();});
  $('liPass')&&($('liPass').onkeydown=e=>{if(e.key==='Enter')liBtn.click();});

  // nav tabs
  document.querySelectorAll('[data-tab]').forEach(el=>el.onclick=()=>{
    state.tab=el.dataset.tab; state.selectedExpert=null; state.q=''; render();
  });

  // expert links (param 4 / experts list / cards)
  document.querySelectorAll('[data-expert]').forEach(el=>el.onclick=()=>{
    state.tab='experts'; state.selectedExpert=el.dataset.expert; render();
  });

  // search
  const sb=$('searchBox'); if(sb) sb.oninput=()=>{ state.q=sb.value; const w=sb.selectionStart; render(); const n=$('searchBox'); if(n){n.focus(); n.setSelectionRange(w,w);} };

  // policy reset
  $('forceReset')&&($('forceReset').onclick=()=>openModal(modalReset()));

  // supervisor financial editor
  document.querySelectorAll('[data-editfin]').forEach(el=>el.onclick=()=>openFinancials(el.dataset.editfin));

  document.querySelectorAll('[data-review]').forEach(el=>el.onclick=()=>openModal(modalReview(el.dataset.review)));
  document.querySelectorAll('[data-viewproj]').forEach(el=>el.onclick=()=>openModal(modalEditMine(el.dataset.viewproj, true)));
  document.querySelectorAll('[data-versions]').forEach(el=>el.onclick=()=>openModal(modalVersions(el.dataset.versions)));
  // formulation/closing
  document.querySelectorAll('[data-editform]').forEach(el=>el.onclick=()=>openFormulation(el.dataset.editform));
  document.querySelectorAll('[data-editclose]').forEach(el=>el.onclick=()=>openClosing(el.dataset.editclose));
  document.querySelectorAll('[data-report]').forEach(el=>el.onclick=()=>openModal(modalReport(el.dataset.report)));
  $('newForm')&&($('newForm').onclick=()=>openFormulation(null));
  $('newClose')&&($('newClose').onclick=()=>openClosing(null));

  // expert project editor
  document.querySelectorAll('[data-editmine]').forEach(el=>el.onclick=()=>openModal(modalEditMine(el.dataset.editmine)));
  $('newProj')&&($('newProj').onclick=()=>openModal(modalEditMine(null)));

  // header buttons
  $('logoutBtn').onclick=()=>{ DB.session=null; save(); state={screen:'landing'}; render(); };
  $('bellBtn').onclick=()=>{ DB.notifications.forEach(n=>n.read=true); save(); render(); openModal(modalNotifs()); };

  // footer
  $('aboutLink').onclick=()=>openModal(modalAbout());
  $('resetLink').onclick=()=>{ if(confirm('Reset all demo data?')) resetDemo(); };
}

function wireModal(){
  const ov=$('overlay'); if(!ov) return;
  ov.addEventListener('mousedown',e=>{ if(e.target===ov) closeModal(); });
  document.querySelectorAll('[data-close]').forEach(el=>el.onclick=closeModal);

  // --- project cost breakdown (live recalc; draft = editingFin) ---
  function syncFin(){
    const c=editingFin; if(!c) return;
    if($('fn_after')) c.afterTDSValue=num($('fn_after').value);
    if($('fn_tds')) c.tdsPct=num($('fn_tds').value);
    if($('fn_margin')) c.marginPct=num($('fn_margin').value);
    if($('fn_link')) c.closingLink=$('fn_link').value;
    (c.internalItems||[]).forEach((it,i)=>{const d=document.querySelector('[data-fint-desc="'+i+'"]'),a=document.querySelector('[data-fint-amt="'+i+'"]'); if(d)it.desc=d.value; if(a)it.amount=num(a.value);});
    (c.spentItems||[]).forEach((it,i)=>{const d=document.querySelector('[data-fsp-desc="'+i+'"]'),a=document.querySelector('[data-fsp-amt="'+i+'"]'); if(d)it.desc=d.value; if(a)it.amount=num(a.value);});
  }
  function paintFin(){
    const cc=computeCost(editingFin); const set=(id,v,col)=>{const e=$(id); if(e){e.textContent=v; if(col!==undefined)e.style.color=col;}};
    set('fcTds',INR(cc.tds)); set('fcTotal',INR(cc.total)); set('fcAfter',INR(cc.afterTDS));
    set('fcMargin',INR(cc.margin)); set('fcAfterMargin',INR(cc.afterMargin));
    set('fcInternal',INR(cc.internal)); set('fcBudget',INR(cc.externalBudget)); set('fcSpent',INR(cc.spent));
    set('fcSaved',INR(cc.moneySaved), cc.moneySaved<0?'var(--bad)':'var(--ok)');
    set('fcTotalP',INR(cc.totalProfit)); set('fcActualP',INR(cc.actualProfit), cc.actualProfit<0?'var(--bad)':'var(--ok)');
  }
  if($('fn_after')){
    const rc=()=>{syncFin(); paintFin();};
    ['fn_after','fn_tds','fn_margin'].forEach(id=>$(id)&&($(id).oninput=rc));
    document.querySelectorAll('[data-fint-desc],[data-fint-amt],[data-fsp-desc],[data-fsp-amt]').forEach(el=>el.oninput=rc);
    $('fn_link')&&($('fn_link').oninput=syncFin);
    document.querySelectorAll('[data-fint-del]').forEach(el=>el.onclick=()=>{syncFin(); editingFin.internalItems.splice(+el.dataset.fintDel,1); openModal(modalFinancials());});
    document.querySelectorAll('[data-fsp-del]').forEach(el=>el.onclick=()=>{syncFin(); editingFin.spentItems.splice(+el.dataset.fspDel,1); openModal(modalFinancials());});
    $('fnAddInt')&&($('fnAddInt').onclick=()=>{syncFin(); editingFin.internalItems.push({desc:'',amount:0}); openModal(modalFinancials());});
    $('fnAddSp')&&($('fnAddSp').onclick=()=>{syncFin(); editingFin.spentItems.push({desc:'',amount:0}); openModal(modalFinancials());});
    $('saveFin')&&($('saveFin').onclick=()=>{
      syncFin(); const p=DB.projects.find(x=>x.id===editingFinPid); const c=editingFin; const cc=computeCost(c);
      p.cost=c;
      p.dateEstimateShared = ($('fn_date')&&$('fn_date').value) ? new Date($('fn_date').value).getTime() : p.dateEstimateShared;
      // mirror into the project columns (7–15) so the table + close logic keep working
      p.estimate=cc.total; p.totalCostAfterTDS=cc.afterTDS; p.internalCost=cc.internal;
      p.externalCost=cc.externalBudget; p.finalClosingCost=cc.spent;
      p.finalGrossProfit=cc.totalProfit; p.finalNetProfit=cc.actualProfit;
      p.closingSheetLink=c.closingLink||p.closingSheetLink;
      editingFin=null; save(); closeModal(); render();
      toast(financialsComplete(p)?'Cost breakdown saved — project can now be closed':'Cost breakdown saved');
    });
  }

  // --- save expert 1-6 / create ---
  $('saveMine')&&($('saveMine').onclick=()=>{
    const id=$('saveMine').dataset.pid;
    const data={ supervisorInCharge:$('m_sup').value, projectName:$('m_name').value.trim(),
      projectType:$('m_type').value.trim(), expertRole:$('m_role').value.trim(), status:$('m_status').value };
    if(!data.projectName){ toast('Project name is required'); return; }
    if(id){ Object.assign(DB.projects.find(x=>x.id===id), data); }
    else { DB.projects.unshift(Object.assign({id:uid(),expertInCharge:DB.session.user.name,updates:[],
      estimate:null,dateEstimateShared:null,totalCostAfterTDS:null,internalCost:null,externalCost:null,
      finalClosingCost:null,closingSheetLink:'',finalGrossProfit:null,finalNetProfit:null,
      formulationId:null,closingId:null,review:null,createdAt:now()},data)); }
    save(); closeModal(); render(); toast('Saved');
  });
  $('addUpdate')&&($('addUpdate').onclick=()=>{
    const p=DB.projects.find(x=>x.id===$('addUpdate').dataset.pid);
    const t=$('m_update').value.trim(); if(!t) return;
    p.updates.push({t:now(),text:t}); save(); openModal(modalEditMine(p.id)); toast('Update posted');
  });

  // edit links / versions (expert uploads; supervisor views)
  $('addVersion')&&($('addVersion').onclick=()=>{
    const pid=$('addVersion').dataset.pid; const p=DB.projects.find(x=>x.id===pid);
    const url=$('ver_url').value.trim(); if(!url){toast('Paste a link first');return;}
    const label=$('ver_label').value.trim(); const fin=$('ver_final').checked;
    p.versions=p.versions||[];
    if(fin) p.versions.forEach(v=>v.final=false);
    p.versions.push({id:uid(),label:label||('V'+(p.versions.length+1)),url:url,final:fin,t:now()});
    save(); openModal(modalEditMine(pid)); toast('Edit link added');
  });
  document.querySelectorAll('[data-ver-del]').forEach(el=>el.onclick=()=>{
    const pid=el.dataset.pid; const p=DB.projects.find(x=>x.id===pid);
    p.versions=(p.versions||[]).filter(v=>v.id!==el.dataset.verDel);
    save(); openModal(modalEditMine(pid)); toast('Link removed');
  });
  document.querySelectorAll('[data-ver-final]').forEach(el=>el.onclick=()=>{
    const pid=el.dataset.pid; const p=DB.projects.find(x=>x.id===pid);
    const v=(p.versions||[]).find(x=>x.id===el.dataset.verFinal); if(!v) return;
    const willBe=!v.final; (p.versions||[]).forEach(x=>x.final=false); v.final=willBe;
    save(); openModal(modalEditMine(pid)); toast(willBe?'Marked as final':'Final unset');
  });

  // --- review sliders ---
  document.querySelectorAll('[data-rv]').forEach(sl=>sl.oninput=()=>{
    const id=sl.id.replace('rv_',''); $('rvv_'+id).textContent=sl.value;
    const tot=['creativity','timeline','thinking','closure'].reduce((a,k)=>a+(+$('rv_'+k).value),0);
    $('rvTotal').textContent=tot+'/40';
    $('rvWarn').style.display = tot<=20?'block':'none';
  });
  $('saveReview')&&($('saveReview').onclick=()=>{
    const p=DB.projects.find(x=>x.id===$('saveReview').dataset.pid);
    const rv={creativity:+$('rv_creativity').value,timeline:+$('rv_timeline').value,thinking:+$('rv_thinking').value,closure:+$('rv_closure').value};
    rv.total=rv.creativity+rv.timeline+rv.thinking+rv.closure; p.review=rv; save();
    if(rv.total<=20){ notifyAll(DB.session.user.name, `⚠ Expert ${p.expertInCharge}'s rating dropped to ${rv.total}/40 on "${p.projectName}". Schedule a meeting to understand the drop.`); }
    closeModal(); render(); toast(rv.total<=20?'Review saved — meeting alert sent':'Review saved');
  });

  // --- formulation sheet (live waterfall + estimate; draft = editingForm) ---
  function syncForm(){
    const f=editingForm; if(!f) return;
    if($('fm_title')) f.title=$('fm_title').value;
    if($('fm_after')) f.afterTDSValue=num($('fm_after').value);
    if($('fm_tds')) f.tdsPct=num($('fm_tds').value);
    if($('fm_margin')) f.marginPct=num($('fm_margin').value);
    if($('fm_notes')) f.notes=$('fm_notes').value;
    (f.internalItems||[]).forEach((it,i)=>{const d=document.querySelector('[data-int-desc="'+i+'"]'),a=document.querySelector('[data-int-amt="'+i+'"]'); if(d)it.desc=d.value; if(a)it.amount=num(a.value);});
    (f.estimateItems||[]).forEach((it,i)=>{const d=document.querySelector('[data-est-desc="'+i+'"]'),q=document.querySelector('[data-est-qty="'+i+'"]'),r=document.querySelector('[data-est-rate="'+i+'"]'); if(d)it.desc=d.value; if(q)it.qty=num(q.value); if(r)it.rate=num(r.value);});
  }
  function paintForm(){
    const cf=computeFormulation(editingForm); const set=(id,v)=>{const e=$(id); if(e)e.textContent=v;};
    set('cTds',INR(cf.tds)); set('cTotal',INR(cf.total)); set('cAfterTDS',INR(cf.afterTDS)); set('cMargin',INR(cf.margin)); set('cAfterMargin',INR(cf.afterMargin));
    set('cInternal',INR(cf.internal)); set('cBudget',INR(cf.externalBudget));
    set('cEstTotal',INR(cf.estTotal));
    (editingForm.estimateItems||[]).forEach((it,i)=>set('estamt_'+i, INR(num(it.qty||1)*num(it.rate))));
    const cmp=$('cCompare'); if(cmp){const diff=cf.externalBudget-cf.estTotal;
      cmp.textContent=diff>=0?('Planned estimate is '+INR(diff)+' under the external budget ✓'):('Planned estimate is '+INR(-diff)+' OVER the external budget ⚠');
      cmp.style.color=diff>=0?'var(--ok)':'var(--bad)';}
  }
  function saveForm(lock){
    syncForm(); const f=editingForm;
    if(!f.title||!f.title.trim()){toast('Project name is required');return;}
    f.locked=!!lock;
    if(f.id){const i=DB.formulations.findIndex(x=>x.id===f.id); DB.formulations[i]=f;}
    else{f.id=uid(); f.createdAt=now(); DB.formulations.unshift(f);}
    editingForm=null; save(); closeModal(); render(); toast(lock?'🔒 Formulation locked':'Draft saved');
  }
  if($('fm_title')){
    const recalc=()=>{syncForm(); paintForm();};
    ['fm_after','fm_tds','fm_margin'].forEach(id=>$(id)&&($(id).oninput=recalc));
    document.querySelectorAll('[data-int-desc],[data-int-amt],[data-est-desc],[data-est-qty],[data-est-rate]').forEach(el=>el.oninput=recalc);
    $('fm_title')&&($('fm_title').oninput=syncForm); $('fm_notes')&&($('fm_notes').oninput=syncForm); $('fm_proj')&&($('fm_proj').onchange=syncForm);
    document.querySelectorAll('[data-int-del]').forEach(el=>el.onclick=()=>{syncForm(); editingForm.internalItems.splice(+el.dataset.intDel,1); openModal(modalFormulation());});
    document.querySelectorAll('[data-est-del]').forEach(el=>el.onclick=()=>{syncForm(); editingForm.estimateItems.splice(+el.dataset.estDel,1); openModal(modalFormulation());});
    $('addInt')&&($('addInt').onclick=()=>{syncForm(); editingForm.internalItems.push({desc:'',amount:0}); openModal(modalFormulation());});
    $('addEst')&&($('addEst').onclick=()=>{syncForm(); editingForm.estimateItems.push({desc:'',qty:1,rate:0}); openModal(modalFormulation());});
    $('saveFormDraft')&&($('saveFormDraft').onclick=()=>saveForm(false));
    $('lockForm')&&($('lockForm').onclick=()=>saveForm(true));
  }

  // --- closing sheet (actual spend -> savings/profit; draft = editingClose) ---
  function syncClose(){
    const c=editingClose; if(!c) return;
    if($('cl_title')) c.title=$('cl_title').value;
    if($('cl_notes')) c.notes=$('cl_notes').value;
    if($('cl_proj')) c.assignedProjectId=$('cl_proj').value||null;
    (c.actualItems||[]).forEach((it,i)=>{const d=document.querySelector('[data-act-desc="'+i+'"]'),a=document.querySelector('[data-act-amt="'+i+'"]'); if(d)it.desc=d.value; if(a)it.amount=num(a.value);});
  }
  function paintClose(){
    const c=editingClose; const cc=computeClosing(c,formulationOfProject(c.assignedProjectId));
    const set=(id,v,col)=>{const e=$(id); if(e){e.textContent=v; if(col!==undefined)e.style.color=col;}};
    set('oBudget',INR(cc.budget)); set('oSpent',INR(cc.spent));
    set('oSaved',INR(cc.moneySaved), cc.moneySaved<0?'var(--bad)':'var(--ok)');
    set('oTotalP',INR(cc.totalProfit)); set('oActualP',INR(cc.actualProfit), cc.actualProfit<0?'var(--bad)':'var(--ok)');
  }
  function saveClose(lock){
    syncClose(); const c=editingClose;
    if(!c.title||!c.title.trim()){toast('Sheet title is required');return;}
    if(lock && !c.assignedProjectId){toast('Choose a closed project to assign before locking');return;}
    c.locked=!!lock;
    if(c.id){const i=DB.closings.findIndex(x=>x.id===c.id); DB.closings[i]=c;}
    else{c.id=uid(); c.createdAt=now(); DB.closings.unshift(c);}
    if(lock){const proj=DB.projects.find(p=>p.id===c.assignedProjectId); if(proj){proj.closingId=c.id; proj.closingSheetLink='closing-sheet://'+c.id;}}
    const id=c.id; editingClose=null; save(); closeModal(); render();
    if(lock) openModal(modalReport(id)); else toast('Draft saved — Unassigned');
  }
  if($('cl_title')){
    const recalcC=()=>{syncClose(); paintClose();};
    document.querySelectorAll('[data-act-desc],[data-act-amt]').forEach(el=>el.oninput=recalcC);
    $('cl_title')&&($('cl_title').oninput=syncClose); $('cl_notes')&&($('cl_notes').oninput=syncClose);
    $('cl_proj')&&($('cl_proj').onchange=()=>{syncClose(); openModal(modalClosing());});
    document.querySelectorAll('[data-act-del]').forEach(el=>el.onclick=()=>{syncClose(); editingClose.actualItems.splice(+el.dataset.actDel,1); openModal(modalClosing());});
    $('addAct')&&($('addAct').onclick=()=>{syncClose(); editingClose.actualItems.push({desc:'',amount:0}); openModal(modalClosing());});
    $('saveCloseDraft')&&($('saveCloseDraft').onclick=()=>saveClose(false));
    $('lockClose')&&($('lockClose').onclick=()=>saveClose(true));
  }
  $('showReportBtn')&&($('showReportBtn').onclick=()=>openModal(modalReport($('showReportBtn').dataset.cid)));

  // --- password reset ---
  $('doReset')&&($('doReset').onclick=()=>{
    const a=$('np1').value,b=$('np2').value;
    if(a.length<6){$('npErr').textContent='Use at least 6 characters.';return;}
    if(a!==b){$('npErr').textContent='Passwords do not match.';return;}
    const sup=DB.session.user; sup.pass=hash(a); sup.passSet=now();
    DB.supervisors.find(s=>s.id===sup.id).pass=sup.pass;
    DB.supervisors.find(s=>s.id===sup.id).passSet=sup.passSet;
    save(); closeModal(); render(); toast('Password updated — next reset in 90 days');
  });

  // --- notifications ---
  $('clearNotifs')&&($('clearNotifs').onclick=()=>{ DB.notifications=[]; save(); closeModal(); render(); });
}

/* =========================== TEAM PASSCODE GATE =========================== */
/* Light protection so a shared link isn't wide open. Change this to your own code.
   Note: this is client-side (deters casual access only) — real security needs a backend login. */
const SS_PASSCODE = 'SugarShot@2026';
(function(){
  const gate=$('gate'); if(!gate) return;
  if(localStorage.getItem('ss_team_ok')==='1'){ gate.style.display='none'; return; }
  gate.style.display='grid';
  const enter=()=>{
    if($('gateInput').value===SS_PASSCODE){ localStorage.setItem('ss_team_ok','1'); gate.style.display='none'; }
    else { $('gateErr').textContent='Incorrect passcode.'; $('gateInput').value=''; }
  };
  $('gateBtn').onclick=enter;
  $('gateInput').addEventListener('keydown',e=>{ if(e.key==='Enter') enter(); });
  $('gateInput').focus();
})();
</script>
